name: Generate EPUB

on:
  workflow_dispatch:  # ręczne uruchamianie (ważne!)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Pobierz repo
      uses: actions/checkout@v3

    - name: Zainstaluj biblioteki
      run: pip install feedparser requests beautifulsoup4 ebooklib

    - name: Uruchom skrypt
      run: python rss_e.py

    - name: Zapisz EPUB
      uses: actions/upload-artifact@v4
      with:
        name: ebook
        path: news*.epub
